

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:transparent}
:root{
  --ink:var(--color-text-primary);
  --ink2:var(--color-text-secondary);
  --ink3:var(--color-text-tertiary);
  --surf:var(--color-background-primary);
  --surf2:var(--color-background-secondary);
  --surf3:var(--color-background-tertiary);
  --border:var(--color-border-tertiary);
  --border2:var(--color-border-secondary);
  --teal:#0F6E56;--teal-bg:#E1F5EE;--teal-border:#5DCAA5;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-border:#85B7EB;
  --purple:#534AB7;--purple-bg:#EEEDFE;--purple-border:#AFA9EC;
  --amber:#854F0B;--amber-bg:#FAEEDA;--amber-border:#EF9F27;
  --red:#A32D2D;--red-bg:#FCEBEB;
  --green:#3B6D11;--green-bg:#EAF3DE;--green-border:#97C459;
  --rad:var(--border-radius-md);--radlg:var(--border-radius-lg);
}
.wrap{padding:1rem 0;max-width:860px;margin:0 auto}

/* top bar */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:0.5px solid var(--border)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;border-radius:var(--rad);background:var(--color-text-primary);display:flex;align-items:center;justify-content:center;color:var(--color-background-primary);font-weight:500;font-size:15px;flex-shrink:0}
.logo-name{font-size:15px;font-weight:500;color:var(--ink)}
.logo-sub{font-size:12px;color:var(--ink3)}
.flow-tabs{display:flex;gap:6px}
.flow-tab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;border:0.5px solid var(--border2);background:var(--surf);color:var(--ink2);cursor:pointer;transition:all .15s;font-family:inherit;display:flex;align-items:center;gap:5px}
.flow-tab.active-super{background:var(--teal-bg);border-color:var(--teal-border);color:var(--teal)}
.flow-tab.active-tenant{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue)}
.flow-tab.active-unit{background:var(--purple-bg);border-color:var(--purple-border);color:var(--purple)}

/* progress */
.progress{display:flex;align-items:flex-start;gap:0;margin-bottom:2rem}
.prog-item{display:flex;flex-direction:column;align-items:center;flex:1;position:relative}
.prog-num{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;border:0.5px solid var(--border2);background:var(--surf2);color:var(--ink3);z-index:1;position:relative;flex-shrink:0}
.prog-num.done{background:var(--teal-bg);border-color:var(--teal-border);color:var(--teal)}
.prog-num.active{background:var(--teal);border-color:var(--teal);color:#fff}
.prog-num.done-blue{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue)}
.prog-num.active-blue{background:var(--blue);border-color:var(--blue);color:#fff}
.prog-num.done-pur{background:var(--purple-bg);border-color:var(--purple-border);color:var(--purple)}
.prog-num.active-pur{background:var(--purple);border-color:var(--purple);color:#fff}
.prog-label{font-size:11px;color:var(--ink3);margin-top:5px;text-align:center;line-height:1.3}
.prog-label.active-l{color:var(--teal);font-weight:500}
.prog-label.active-lb{color:var(--blue);font-weight:500}
.prog-label.active-lp{color:var(--purple);font-weight:500}
.prog-connector{height:1px;flex:1;background:var(--border);margin-top:15px;flex-shrink:0}
.prog-connector.filled{background:var(--teal)}
.prog-connector.filled-blue{background:var(--blue)}
.prog-connector.filled-pur{background:var(--purple)}

/* card */
.card{background:var(--surf);border:0.5px solid var(--border);border-radius:var(--radlg);padding:1.25rem}
.card+.card{margin-top:12px}

/* step header */
.step-tag{display:inline-block;font-size:11px;font-weight:500;letter-spacing:.04em;padding:3px 10px;border-radius:20px;margin-bottom:.75rem}
.tag-teal{background:var(--teal-bg);color:var(--teal)}
.tag-blue{background:var(--blue-bg);color:var(--blue)}
.tag-pur{background:var(--purple-bg);color:var(--purple)}
.step-title{font-size:22px;font-weight:500;color:var(--ink);margin-bottom:.4rem}
.step-sub{font-size:14px;color:var(--ink2);line-height:1.65;margin-bottom:1.5rem}

/* form */
.field{margin-bottom:1rem}
.field label{display:block;font-size:13px;color:var(--ink2);margin-bottom:5px;font-weight:500}
.field input,.field select{width:100%;font-family:inherit;font-size:14px}
.field .hint{font-size:12px;color:var(--ink3);margin-top:4px}
.err{border-color:var(--red) !important}
.err-msg{font-size:12px;color:var(--red);margin-top:4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}

/* buttons */
.btn{padding:10px 22px;border-radius:var(--rad);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit;border:0.5px solid var(--border2);background:var(--surf);color:var(--ink2)}
.btn:hover{background:var(--surf2)}
.btn-primary{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled,.btn-primary[disabled]{background:var(--surf2);color:var(--ink3);border-color:var(--border);cursor:not-allowed}
.btn-blue{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-blue:hover{opacity:.9}
.btn-pur{background:var(--purple);color:#fff;border-color:var(--purple)}
.btn-pur:hover{opacity:.9}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem;padding-top:1rem;border-top:0.5px solid var(--border)}

/* plan cards */
.plan-card{border:0.5px solid var(--border2);border-radius:var(--radlg);padding:16px 14px;cursor:pointer;transition:all .15s;position:relative}
.plan-card.sel{border-color:var(--teal-border);border-width:1.5px;background:var(--teal-bg)}
.plan-card-name{font-size:14px;font-weight:500;color:var(--ink);margin-bottom:4px}
.plan-card-price{font-size:20px;font-weight:500;color:var(--ink);margin-bottom:2px}
.plan-card-seats{font-size:12px;color:var(--ink3);margin-top:8px;padding-top:8px;border-top:0.5px solid var(--border)}
.popular-badge{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--teal);color:#fff;font-size:10px;font-weight:500;padding:2px 10px;border-radius:20px;white-space:nowrap}

/* pill toggle */
.pill-row{display:flex;gap:6px;margin-bottom:1.25rem}
.pill{padding:7px 18px;border-radius:20px;font-size:13px;border:0.5px solid var(--border2);background:var(--surf);color:var(--ink2);cursor:pointer;font-family:inherit;transition:all .15s}
.pill.active{border-color:var(--teal-border);background:var(--teal-bg);color:var(--teal)}

/* module card */
.mod-card{border:0.5px solid var(--border);border-radius:var(--rad);padding:13px 15px;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:12px;position:relative}
.mod-card.on{border-color:var(--teal-border);background:var(--teal-bg)}
.mod-card.locked-off{opacity:.4;cursor:default}
.mod-icon{font-size:20px;flex-shrink:0}
.mod-name{font-size:13px;font-weight:500;color:var(--ink)}
.mod-desc{font-size:12px;color:var(--ink2);margin-top:2px}
.check-box{width:18px;height:18px;border-radius:4px;border:0.5px solid var(--border2);background:var(--surf);flex-shrink:0;margin-left:auto;display:flex;align-items:center;justify-content:center;font-size:12px}
.check-box.on{background:var(--teal);border-color:var(--teal);color:#fff}
.upgrade-badge{position:absolute;top:8px;right:10px;font-size:10px;color:var(--ink3);font-weight:500}

/* info box */
.info-box{border-radius:var(--rad);padding:11px 14px;font-size:13px;line-height:1.6;margin-bottom:1rem}
.info-blue{background:var(--blue-bg);border:0.5px solid var(--blue-border);color:var(--blue)}
.info-amber{background:var(--amber-bg);border:0.5px solid var(--amber-border);color:var(--amber)}
.info-teal{background:var(--teal-bg);border:0.5px solid var(--teal-border);color:var(--teal)}
.info-green{background:var(--green-bg);border:0.5px solid var(--green-border);color:var(--green)}

/* accordion tenant/unit */
.acc-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;border-radius:var(--radlg)}
.acc-body{padding:0 18px 18px;border-top:0.5px solid var(--border)}
.acc-num{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0}
.ready-tag{background:var(--teal-bg);color:var(--teal);font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.ready-tag-blue{background:var(--blue-bg);color:var(--blue);font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.add-btn{width:100%;padding:13px;border:1px dashed var(--border2);border-radius:var(--radlg);background:transparent;cursor:pointer;color:var(--ink3);font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;font-family:inherit;margin-bottom:1rem}
.add-btn:hover{background:var(--surf2)}
.rem-btn{background:none;border:none;cursor:pointer;color:var(--red-bg);font-size:16px;padding:0 4px;color:var(--red)}

/* leave type cards */
.leave-card{border:0.5px solid var(--border);border-radius:var(--rad);padding:13px 15px;cursor:pointer;transition:all .15s}
.leave-card.on{border-color:var(--teal-border);background:var(--teal-bg)}
.leave-card-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.tag-sm{font-size:11px;padding:2px 8px;border-radius:12px;font-weight:500}
.tag-blue-sm{background:var(--blue-bg);color:var(--blue)}
.tag-gray-sm{background:var(--surf2);color:var(--ink3)}
.tag-pur-sm{background:var(--purple-bg);color:var(--purple)}

/* payroll slider */
.slider-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.slider-label{font-size:13px;color:var(--ink2);width:120px;flex-shrink:0}
.slider-pct{width:44px;text-align:center;font-size:14px;font-weight:500;color:var(--teal);background:var(--teal-bg);padding:4px 6px;border-radius:var(--rad)}
.slider-row input[type=range]{flex:1;accent-color:var(--teal)}

/* day toggle */
.day-btn{padding:8px 14px;border-radius:var(--rad);cursor:pointer;font-size:13px;border:0.5px solid var(--border2);background:var(--surf);color:var(--ink2);transition:all .15s;font-family:inherit}
.day-btn.on{border-color:var(--teal-border);background:var(--teal-bg);color:var(--teal);font-weight:500}

/* toggle switch */
.toggle-wrap{display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:14px}
.toggle{width:42px;height:22px;border-radius:11px;background:var(--border2);position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--teal)}
.toggle-knob{width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:left .2s}
.toggle.on .toggle-knob{left:23px}
.toggle-label{font-size:14px;color:var(--ink)}

/* done screen */
.done-wrap{text-align:center;padding:2.5rem 0}
.done-icon{font-size:56px;margin-bottom:1rem}
.done-title{font-size:24px;font-weight:500;color:var(--ink);margin-bottom:.5rem}
.done-sub{font-size:14px;color:var(--ink2);max-width:440px;margin:0 auto 1.5rem;line-height:1.65}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:460px;margin:0 auto 1.5rem}
.stat-card{background:var(--surf2);border-radius:var(--rad);padding:14px 12px;text-align:center}
.stat-icon{font-size:22px;margin-bottom:4px}
.stat-label{font-size:11px;color:var(--ink3)}
.stat-val{font-size:15px;font-weight:500;color:var(--ink)}

/* billing */
.card-logos{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
.card-logo-tag{font-size:11px;color:var(--ink3);background:var(--surf2);padding:3px 8px;border-radius:4px;border:0.5px solid var(--border)}
.ssl-tag{margin-left:auto;font-size:12px;color:var(--ink3);display:flex;align-items:center;gap:5px}
.order-row{display:flex;justify-content:space-between;margin-bottom:10px;font-size:13px}
.order-total{border-top:0.5px solid var(--border);padding-top:12px;margin-top:6px}
.checkbox-row{display:flex;align-items:flex-start;gap:10px;cursor:pointer;margin-top:.75rem}
.cb-box{width:18px;height:18px;border-radius:4px;border:0.5px solid var(--border2);background:var(--surf);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s}
.cb-box.on{background:var(--teal);border-color:var(--teal);color:#fff}
.cb-label{font-size:13px;color:var(--ink2);line-height:1.6}

/* stat bar */
.mod-summary{background:var(--surf2);border-radius:var(--rad);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;font-size:13px;color:var(--ink2)}

.hidden{display:none}
</style>

<h2 class="sr-only">Enterprise HRMS multi-tier onboarding wizard with three role-based flows: super admin, tenant admin, and unit admin</h2>

<div class="wrap" id="app">

<div class="topbar">
  <div class="logo">
    <div class="logo-icon">B</div>
    <div>
      <div class="logo-name">BenoSupport</div>
      <div class="logo-sub">Enterprise HRMS</div>
    </div>
  </div>
  <div class="flow-tabs">
    <button class="flow-tab active-super" onclick="switchFlow('super')" id="tab-super"><i class="ti ti-settings" aria-hidden="true"></i> Super admin</button>

<div id="progress-bar"></div>
<div id="step-content"></div>

</div>

<script>
const STATE = {
  flow: 'super',
  step: 0,
  data: {}
};

// тФАтФАтФА Plan / module data тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
const PLANS = [
  {id:'starter', name:'Starter', monthly:999, annual:799, seats:50, icon:'ЁЯМ▒'},
  {id:'growth', name:'Growth', monthly:2499, annual:1999, seats:200, icon:'ЁЯЪА', popular:true},
  {id:'pro', name:'Pro', monthly:5999, annual:4799, seats:500, icon:'тЪб'},
  {id:'enterprise', name:'Enterprise', monthly:null, annual:null, seats:null, icon:'ЁЯПв'},
];

const MODULES = [
  {id:'core',name:'Core platform',icon:'тмб',desc:'Auth, RBAC, audit logs',required:true,plans:['starter','growth','pro','enterprise']},
  {id:'employee',name:'Employee mgmt',icon:'ЁЯСд',desc:'Profiles, lifecycle',required:true,plans:['starter','growth','pro','enterprise']},
  {id:'attendance',name:'Attendance',icon:'ЁЯХР',desc:'Check-in, biometric, WFH',required:false,plans:['growth','pro','enterprise']},
  {id:'leave',name:'Leave mgmt',icon:'ЁЯМ┤',desc:'Policy, approvals, balance',required:false,plans:['growth','pro','enterprise']},
  {id:'payroll',name:'Payroll',icon:'ЁЯТ│',desc:'Salary, pay runs, slips',required:false,plans:['growth','pro','enterprise']},
  {id:'appraisal',name:'Performance',icon:'тнР',desc:'Goals, reviews, ratings',required:false,plans:['pro','enterprise']},
  {id:'recruitment',name:'Recruitment',icon:'ЁЯОп',desc:'Jobs, pipeline, offers',required:false,plans:['pro','enterprise']},
  {id:'training',name:'Training & LMS',icon:'ЁЯОУ',desc:'Courses, certifications',required:false,plans:['pro','enterprise']},
  {id:'expenses',name:'Expenses',icon:'ЁЯз╛',desc:'Claims, reimbursement',required:false,plans:['enterprise']},
  {id:'analytics',name:'Analytics',icon:'ЁЯУК',desc:'Custom dashboards, BI',required:false,plans:['enterprise']},
];

const FLOW_LABELS = {
  super: ['Plan','Modules','Billing','Organisation','Tenants','Done'],
  tenant: ['Welcome','LOBs','Units','Done'],
  unit: ['Welcome','Company','Leave','Payroll','Working days','Done'],
};

const LEAVE_TYPES = [
  {id:'annual',name:'Annual leave',icon:'ЁЯМ┤',days:21,accrual:'monthly',cf:true},
  {id:'sick',name:'Sick leave',icon:'ЁЯПе',days:10,accrual:'monthly',cf:false},
  {id:'casual',name:'Casual leave',icon:'тШХ',days:8,accrual:'upfront',cf:false},
  {id:'maternity',name:'Maternity leave',icon:'ЁЯС╢',days:182,accrual:'upfront',cf:false},
  {id:'paternity',name:'Paternity leave',icon:'ЁЯСитАНЁЯСз',days:15,accrual:'upfront',cf:false},
  {id:'comp',name:'Compensatory off',icon:'ЁЯТ╝',days:0,accrual:'earned',cf:true},
];

// тФАтФАтФА Utilities тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
function v(id){ return document.getElementById(id); }
function val(id){ const el=v(id); return el ? el.value.trim() : ''; }

function validate(rules){
  let ok=true;
  rules.forEach(({id,check,msg})=>{
    const el=v(id); if(!el)return;
    const pass = check(el.value.trim());
    el.classList.toggle('err',!pass);
    let em=el.parentElement.querySelector('.err-msg');
    if(!pass){ if(!em){em=document.createElement('p');em.className='err-msg';el.parentElement.appendChild(em);} em.textContent=msg; ok=false; }
    else if(em) em.remove();
  });
  return ok;
}

function isEmail(s){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s); }

// тФАтФАтФА Progress bar тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
function renderProgress(){
  const labels = FLOW_LABELS[STATE.flow];
  const step = STATE.step;
  const f = STATE.flow;
  const doneClass = f==='tenant'?'done-blue':f==='unit'?'done-pur':'done';
  const activeClass = f==='tenant'?'active-blue':f==='unit'?'active-pur':'active';
  const activeLClass = f==='tenant'?'active-lb':f==='unit'?'active-lp':'active-l';
  const connFilled = f==='tenant'?'filled-blue':f==='unit'?'filled-pur':'filled';

  let html='<div class="progress">';
  labels.forEach((l,i)=>{
    const done=i<step, active=i===step;
    const nc = done?doneClass:active?activeClass:'';
    const lc = active?activeLClass:'';
    if(i>0) html+=`<div class="prog-connector ${i<=step?connFilled:''}"></div>`;
    html+=`<div class="prog-item"><div class="prog-num ${nc}">${done?'<i class="ti ti-check" style="font-size:13px" aria-hidden="true"></i>':i+1}</div><div class="prog-label ${lc}">${l}</div></div>`;
  });
  html+='</div>';
  v('progress-bar').innerHTML=html;
}

function renderStepPlan(){
  const d=STATE.data;
  const billing=d.billing||'monthly';
  const plan=d.plan||'growth';
  let html=`
  <div class="step-tag tag-teal">Step 1 of 5</div>
  <h1 class="step-title">Choose your plan</h1>
  <p class="step-sub">Every plan includes a 14-day free trial. Customise modules in the next step.</p>
  <div class="pill-row">
    <button class="pill ${billing==='monthly'?'active':''}" onclick="setBilling('monthly')">Monthly</button>
    <button class="pill ${billing==='annual'?'active':''}" onclick="setBilling('annual')">Annual <span style="color:var(--teal);font-weight:500">тИТ20%</span></button>
  </div>
  <div class="grid4" style="margin-bottom:1.5rem">`;
  PLANS.forEach(p=>{
    const sel=plan===p.id;
    const price=billing==='annual'?p.annual:p.monthly;
    html+=`<div class="plan-card ${sel?'sel':''}" onclick="setPlan('${p.id}')">
      ${p.popular?`<div class="popular-badge">Most popular</div>`:''}
      <div style="font-size:20px;margin-bottom:6px">${p.icon}</div>
      <div class="plan-card-name">${p.name}</div>
      <div class="plan-card-price">${price?`тВ╣${price.toLocaleString()}`:' Custom'}</div>
      ${price?`<div style="font-size:11px;color:var(--ink3)">/ mo${billing==='annual'?' (annual)':''}</div>`:''}
      <div class="plan-card-seats">${p.seats?`Up to ${p.seats} employees`:'Unlimited'}</div>
    </div>`;
  });
  html+=`</div>
  <div class="nav-row"><span></span><button class="btn btn-primary" onclick="planNext()">Select modules <i class="ti ti-arrow-right" aria-hidden="true"></i></button></div>`;
  v('step-content').innerHTML=html;
}

function setBilling(b){ STATE.data.billing=b; renderStepPlan(); }
function setPlan(p){ STATE.data.plan=p; renderStepPlan(); }
function planNext(){ STATE.data.plan=STATE.data.plan||'growth'; STATE.data.billing=STATE.data.billing||'monthly'; next(); }

function renderStepModules(){
  const d=STATE.data;
  const plan=d.plan||'growth';
  const sel=d.modules||MODULES.filter(m=>m.required||m.plans.includes(plan)).map(m=>m.id);
  STATE.data.modules=sel;
  let html=`
  <div class="step-tag tag-teal">Step 2 of 5</div>
  <h1 class="step-title">Customise your modules</h1>
  <p class="step-sub">You're on the <strong>${PLANS.find(p=>p.id===plan)?.name}</strong> plan. Toggle to add or remove modules.</p>
  <div class="grid2" style="margin-bottom:.75rem">`;
  MODULES.forEach(m=>{
    const inPlan=m.plans.includes(plan);
    const on=sel.includes(m.id);
    html+=`<div class="mod-card ${on&&inPlan?'on':''} ${!inPlan?'locked-off':''}" onclick="toggleModule('${m.id}')">
      ${!inPlan?`<div class="upgrade-badge">Upgrade</div>`:''}
      <span class="mod-icon">${m.icon}</span>
      <div style="flex:1">
        <div class="mod-name">${m.name} ${m.required?`<span class="tag-sm tag-blue-sm" style="margin-left:4px">Required</span>`:''}</div>
        <div class="mod-desc">${m.desc}</div>
      </div>
      <div class="check-box ${on&&inPlan?'on':''}">${on&&inPlan?'<i class="ti ti-check" aria-hidden="true"></i>':''}</div>
    </div>`;
  });
  html+=`</div>
  <div class="mod-summary"><span><strong style="color:var(--ink)">${sel.length} modules</strong> selected</span><span class="step-tag tag-teal" style="margin:0">${PLANS.find(p=>p.id===plan)?.name}</span></div>
  <div class="nav-row">
    <button class="btn" onclick="back()"><i class="ti ti-arrow-left" aria-hidden="true"></i> Back</button>
    <button class="btn btn-primary" onclick="next()">Continue to billing <i class="ti ti-arrow-right" aria-hidden="true"></i></button>
  </div>`;
  v('step-content').innerHTML=html;
}

function toggleModule(id){
  const m=MODULES.find(x=>x.id===id);
  if(!m||m.required)return;
  const plan=STATE.data.plan||'growth';
  if(!m.plans.includes(plan))return;
  const sel=STATE.data.modules||[];
  STATE.data.modules=sel.includes(id)?sel.filter(x=>x!==id):[...sel,id];
  renderStepModules();
}

  <h1 class="step-title">Secure payment</h1>

      </div>
      <div class="field"><label>Cardholder name</label><input id="card-name" type="text" placeholder="Vibhav Singh" value="${d.cardName||''}"></div>
      <div class="field"><label>Card number</label><input id="card-num" type="text" placeholder="1234 5678 9012 3456" maxlength="19" value="${d.cardNum||''}"></div>

      </div>
      <div class="checkbox-row" onclick="toggleAgreed()">

      </div>
    </div>
    <div>
      <div class="card" style="margin-bottom:10px">
        <div style="font-size:12px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px">Order summary</div>
        <div class="order-row"><span style="color:var(--ink2)">${plan?.name} plan</span><span style="font-weight:500;color:var(--ink)">${price?`тВ╣${price.toLocaleString()}/mo`:'Custom'}</span></div>
        <div class="order-row"><span style="color:var(--ink2)">Modules</span><span style="font-weight:500;color:var(--ink)">${d.modules?.length||0}</span></div>
        <div class="order-row"><span style="color:var(--ink2)">Billing</span><span style="font-weight:500;color:var(--ink);text-transform:capitalize">${d.billing||'monthly'}</span></div>
        <div class="order-total">
          <div class="order-row" style="margin:0"><span style="font-size:15px;font-weight:500;color:var(--ink)">Due today</span><span style="font-size:18px;font-weight:500;color:var(--teal)">тВ╣0.00</span></div>
          <p style="font-size:12px;color:var(--ink3);margin-top:6px">First charge after 14-day trial: ${price?`тВ╣${price.toLocaleString()}`:'Custom pricing'}</p>
        </div>
      </div>
      <div class="info-box info-teal" style="margin-bottom:10px"><strong>14-day free trial</strong> тАФ full access to all selected modules. Reminder sent 3 days before trial ends.</div>
      <button class="btn btn-primary" style="width:100%" id="pay-btn" onclick="billingNext()">Start free trial <i class="ti ti-arrow-right" aria-hidden="true"></i></button>
    </div>
  </div>
  <div class="nav-row" style="border:none;padding:0;margin-top:.75rem">
    <button class="btn" onclick="back()"><i class="ti ti-arrow-left" aria-hidden="true"></i> Back</button><span></span>
  </div>`;
  v('step-content').innerHTML=html;
  updatePayBtn();
  v('card-num').addEventListener('input',e=>{ e.target.value=e.target.value.replace(/\D/g,'').slice(0,16).replace(/(.{4})/g,'$1 ').trim(); STATE.data.cardNum=e.target.value; updatePayBtn(); });
  v('card-exp').addEventListener('input',e=>{ let val=e.target.value.replace(/\D/g,'').slice(0,4); if(val.length>2)val=val.slice(0,2)+'/'+val.slice(2); e.target.value=val; STATE.data.cardExp=val; updatePayBtn(); });

function toggleAgreed(){ STATE.data.billingAgreed=!STATE.data.billingAgreed; renderStepBilling(); }
function updatePayBtn(){
  const d=STATE.data;
  const ok=d.billingAgreed&&d.cardName&&(d.cardNum||'').replace(/\s/g,'').length===16&&(d.cardExp||'').length===5&&(d.cardCvc||'').length===3;
  const btn=v('pay-btn'); if(btn){btn.disabled=!ok; btn.className='btn btn-primary'+(ok?'':' disabled'); if(!ok) btn.style.cssText='width:100%;background:var(--surf2);color:var(--ink3);border-color:var(--border);cursor:not-allowed';}
}
function billingNext(){
  const d=STATE.data;
  if(!d.billingAgreed||(d.cardNum||'').replace(/\s/g,'').length!==16)return;
  next();
}

function orgNext(){
  const ok=validate([
    {id:'org-name',check:v=>v.length>0,msg:'Organisation name is required'},
    {id:'org-email',check:v=>isEmail(v),msg:'Enter a valid email address'},
    {id:'oa-name',check:v=>v.length>0,msg:'Admin name is required'},
    {id:'oa-email',check:v=>isEmail(v),msg:'Enter a valid email address'},
  ]);
  if(!ok)return;
  STATE.data.org={name:val('org-name'),industry:val('org-industry'),country:val('org-country'),email:val('org-email'),phone:val('org-phone')};
  STATE.data.orgAdmin={name:val('oa-name'),email:val('oa-email')};
  next();
}

function renderStepTenants(){
  const d=STATE.data;
  if(!d.tenants) d.tenants=[{id:1,name:'',pan:'',gst:'',state:'Maharashtra',adminName:'',adminEmail:'',open:true}];
  const states=['Maharashtra','Karnataka','Tamil Nadu','Delhi','Gujarat','Telangana','UP','West Bengal','Other'];
  let html=`
  <div class="step-tag tag-teal">Step 5 of 5</div>
  <h1 class="step-title">Add your companies (tenants)</h1>
  <p class="step-sub">Each company is fully isolated. Tenant admins receive login credentials by email.</p>`;
  d.tenants.forEach((t,i)=>{
    const ready=t.name&&t.adminEmail;
    html+=`<div class="card" style="margin-bottom:12px;padding:0;overflow:hidden">
      <div class="acc-header" onclick="toggleTenant(${t.id})">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="acc-num" style="background:var(--teal-bg);border:0.5px solid var(--teal-border);color:var(--teal);font-weight:500">${i+1}</div>
          <div>
            <div style="font-size:14px;font-weight:500;color:var(--ink)">${t.name||`Company ${i+1}`}</div>
            <div style="font-size:12px;color:var(--ink3)">${t.adminEmail||'Admin not set'}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          ${ready?`<span class="ready-tag"><i class="ti ti-check" style="font-size:11px" aria-hidden="true"></i> Ready</span>`:''}
          ${d.tenants.length>1?`<button class="rem-btn" onclick="event.stopPropagation();removeTenant(${t.id})"><i class="ti ti-x" style="font-size:15px" aria-hidden="true"></i></button>`:''}
          <i class="ti ti-chevron-${t.open?'up':'down'}" style="color:var(--ink3)" aria-hidden="true"></i>
        </div>
      </div>
      ${t.open?`<div class="acc-body">
        <div class="grid2" style="margin-top:14px">
          <div class="field"><label>Legal company name <span style="color:var(--red)">*</span></label><input id="tn-name-${t.id}" placeholder="Acme Manufacturing Ltd." value="${t.name}" oninput="updateTenant(${t.id},'name',this.value)"></div>
          <div class="field"><label>State</label><select id="tn-state-${t.id}" onchange="updateTenant(${t.id},'state',this.value)">${states.map(s=>`<option ${t.state===s?'selected':''}>${s}</option>`).join('')}</select></div>
          <div class="field"><label>PAN</label><input placeholder="AACCA1234Z" value="${t.pan}" oninput="updateTenant(${t.id},'pan',this.value.toUpperCase().slice(0,10))"></div>
          <div class="field"><label>GST number</label><input placeholder="09AACCA1234Z1Z1" value="${t.gst}" oninput="updateTenant(${t.id},'gst',this.value.toUpperCase().slice(0,15))"></div>
        </div>
        <div style="border-top:1px dashed var(--border);padding-top:14px;margin-top:4px">
          <div style="font-size:13px;font-weight:500;color:var(--ink);margin-bottom:12px"><i class="ti ti-user-circle" aria-hidden="true"></i> Tenant admin тАФ will receive login credentials</div>
          <div class="grid2">
            <div class="field"><label>Admin full name <span style="color:var(--red)">*</span></label><input id="tn-aname-${t.id}" placeholder="Rahul Sharma" value="${t.adminName}" oninput="updateTenant(${t.id},'adminName',this.value)"></div>
            <div class="field"><label>Admin email <span style="color:var(--red)">*</span></label><input id="tn-aemail-${t.id}" type="email" placeholder="rahul@acmemfg.in" value="${t.adminEmail}" oninput="updateTenant(${t.id},'adminEmail',this.value)"></div>
          </div>
          <div class="info-box info-amber"><i class="ti ti-lock" style="font-size:13px" aria-hidden="true"></i> BenoSupport will auto-create a login account and send credentials to this email. Tenant admin sets password on first login.</div>
        </div>
      </div>`:''}
    </div>`;
  });
  html+=`<button class="add-btn" onclick="addTenant()"><i class="ti ti-plus" style="color:var(--teal);font-size:18px" aria-hidden="true"></i> Add another company</button>
  <div class="nav-row">
    <button class="btn" onclick="back()"><i class="ti ti-arrow-left" aria-hidden="true"></i> Back</button>
    <button class="btn btn-primary" onclick="tenantsNext()">Launch workspace <i class="ti ti-rocket" aria-hidden="true"></i></button>
  </div>`;
  v('step-content').innerHTML=html;
}

function toggleTenant(id){ const t=STATE.data.tenants.find(x=>x.id===id); if(t)t.open=!t.open; renderStepTenants(); }
function addTenant(){ STATE.data.tenants.push({id:Date.now(),name:'',pan:'',gst:'',state:'Maharashtra',adminName:'',adminEmail:'',open:true}); renderStepTenants(); }
function removeTenant(id){ STATE.data.tenants=STATE.data.tenants.filter(x=>x.id!==id); renderStepTenants(); }
function updateTenant(id,field,value){ const t=STATE.data.tenants.find(x=>x.id===id); if(t)t[field]=value; }

function tenantsNext(){
  const ts=STATE.data.tenants;
  let ok=true;
  ts.forEach(t=>{
    const nameEl=v(`tn-name-${t.id}`); const emailEl=v(`tn-aemail-${t.id}`);
    if(nameEl&&!nameEl.value.trim()){ nameEl.classList.add('err'); ok=false; }
    if(emailEl&&!isEmail(emailEl.value.trim())){ emailEl.classList.add('err'); ok=false; }
  });
  if(!ok)return;
  next();
}

const RENDERS = {
  super:  [renderStepPlan, renderStepModules, renderStepBilling, renderStepOrg, renderStepTenants, renderSuperDone],
  tenant: [renderTenantWelcome, renderTenantLOB, renderTenantUnits, renderTenantDone],
  unit:   [renderUnitWelcome, renderUnitCompany, renderUnitLeave, renderUnitPayroll, renderUnitWorkingDays, renderUnitDone],
};

function render(){
  renderProgress();
  const fn=RENDERS[STATE.flow][STATE.step];
  if(fn) fn();
}

function next(){ STATE.step=Math.min(STATE.step+1, RENDERS[STATE.flow].length-1); render(); }
function back(){ STATE.step=Math.max(STATE.step-1, 0); render(); }

function switchFlow(f){
  STATE.flow=f; STATE.step=0; STATE.data={};
  ['super','tenant','unit'].forEach(fl=>{
    const tab=v(`tab-${fl}`);
    tab.className='flow-tab'+(fl===f?` active-${fl}`:'');
  });
  render();
}

render();
</script>
